name: Deploy Server to ECS (ECR + Versioned CI/CD)

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: water-drop-server

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Server Repo
        uses: actions/checkout@v4

      - name: Generate TAG (sha + date + time)
        run: echo "TAG=$(git rev-parse --short HEAD)_$(date +%Y-%m-%d_%H:%M:%S)" >> $GITHUB_ENV

      - name: Set up AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to AWS ECR
        run: |
          aws ecr get-login-password \
          | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME .

      - name: Tag Docker Image
        run: |
          docker tag $IMAGE_NAME:latest ${{ secrets.ECR_REGISTRY }}/$IMAGE_NAME:latest
          docker tag $IMAGE_NAME:latest ${{ secrets.ECR_REGISTRY }}/$IMAGE_NAME:${{ env.TAG }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/$IMAGE_NAME:latest
          docker push ${{ secrets.ECR_REGISTRY }}/$IMAGE_NAME:${{ env.TAG }}

      - name: SSH deploy to ECS (Update Server only)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/water-drop-deploy

            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}

            echo "📍 Current dir: $(pwd)"
            docker compose version

            echo "🔐 登入ECR..."
            aws ecr get-login-password --region $AWS_DEFAULT_REGION \
            | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }} || exit 1

            echo "📥 拉取最新鏡像..."
            docker compose pull server || exit 1

            echo "🚀 重新啟動Server容器..."
            docker compose up -d --force-recreate server

            echo "✅ Server 服務更新完成!"
